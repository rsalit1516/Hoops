# File: .github/workflows/azure-static-web-apps.yml

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular App
    # prod environment requires manual approval via GitHub environment protection rules
    environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Show Node version
        run: |
          which node
          node -v
          npm -v

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./hoops.ui

      - name: Run Angular unit tests
        run: npx ng test csbc --watch=false --browsers=ChromeHeadless
        working-directory: ./hoops.ui

      - name: Select build configuration
        id: config
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "ng_config=production" >> $GITHUB_OUTPUT
            echo "swa_token_secret=AZURE_STATIC_WEB_APPS_TOKEN_PROD" >> $GITHUB_OUTPUT
          else
            echo "ng_config=staging" >> $GITHUB_OUTPUT
            echo "swa_token_secret=AZURE_STATIC_WEB_APPS_TOKEN" >> $GITHUB_OUTPUT
          fi

      - name: Build Angular app
        run: npx ng build csbc --configuration ${{ steps.config.outputs.ng_config }}
        working-directory: ./hoops.ui

      - name: Confirm build output exists
        run: |
          echo "Listing dist contents:"
          ls -R ./dist/hoops/browser
        working-directory: ./hoops.ui

      - name: Deploy to Azure Static Web Apps (dev)
        if: github.ref != 'refs/heads/master'
        uses: Azure/static-web-apps-deploy@v1
        with:
          app_location: "./hoops.ui/dist/hoops/browser"
          output_location: ""
          skip_app_build: true
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          action: "upload"

      - name: Deploy to Azure Static Web Apps (prod)
        if: github.ref == 'refs/heads/master'
        uses: Azure/static-web-apps-deploy@v1
        with:
          app_location: "./hoops.ui/dist/hoops/browser"
          output_location: ""
          skip_app_build: true
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_PROD }}
          action: "upload"
