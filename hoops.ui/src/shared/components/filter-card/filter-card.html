<mat-card class="filter-card">
  <mat-card-content>
    <div class="filter-row">
      <ng-content></ng-content>
      <button
        type="button"
        mat-raised-button
        color="accent"
        (click)="clearClicked.emit()"
        [disabled]="!hasActiveFilters"
        class="clear-button"
      >
        {{ clearLabel }}
      </button>
    </div>
  </mat-card-content>
</mat-card>
