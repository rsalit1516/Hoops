<div class="household-filters-container">
  <!-- Alphabetical Search -->
  <div class="alphabetical-filter">
    <csbc-alphabetical-search [(selectedLetter)]="selectedLetter" />
  </div>

  <!-- Additional Filters -->
  <mat-card class="filter-card">
    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-row">
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Search by Name</mat-label>
            <input matInput formControlName="searchText" placeholder="Enter household name">
          </mat-form-field>

          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="Enter email">
          </mat-form-field>

          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" placeholder="Enter phone">
          </mat-form-field>

          <button
            mat-raised-button
            color="accent"
            (click)="clearFilters()"
            [disabled]="!hasActiveFilters"
            class="clear-button">
            Clear Filters
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
