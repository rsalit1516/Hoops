<div class="list-page-container">
  <!-- Filter Section -->
  <div class="filter-section">
    <ng-content select="[filter]" />
  </div>

  <!-- Action Bar (optional - for add buttons, etc) -->
  <div class="action-bar">
    @if (title()) {
      <h2>{{ title() }}@if (count() > 0) { ({{ count() }})} </h2>
    }
    <ng-content select="[actions]" />
  </div>

  <!-- List/Table Section -->
  <div class="list-section">
    <mat-card>
      @if (title()) {
        <mat-card-header>
          <mat-card-title>{{ title() }}@if (count() > 0) { ({{ count() }})} </mat-card-title>
        </mat-card-header>
      }
      <mat-card-content>
        <ng-content select="[list]" />
      </mat-card-content>
    </mat-card>
  </div>
</div>
