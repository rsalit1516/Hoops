<div class="people-filters-container">
  <!-- Alphabetical Search -->
  <div class="alphabetical-filter">
    <csbc-alphabetical-search [(selectedLetter)]="selectedLetter" />
  </div>

  <!-- Additional Filters -->
  <mat-card class="filter-card">
    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-row">
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" />
          </mat-form-field>

          <div class="checkbox-field">
            <mat-checkbox formControlName="playerOnly">
              Players Only
            </mat-checkbox>
          </div>

          <button
            type="button"
            mat-raised-button
            color="accent"
            (click)="clearFilters()"
            [disabled]="!hasActiveFilters"
            class="clear-button"
          >
            Clear Filters
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
