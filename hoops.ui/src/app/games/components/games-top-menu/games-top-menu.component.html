<div class="top-menu-wrapper">
  <div class="seasonDescription">
    <h2 class="col-12">{{ seasonDescription }}</h2>
  </div>
  <mat-grid-list cols="3" rowHeight="100px">
    <mat-grid-tile cols="2">
      <mat-toolbar>
        <div>
          <mat-tab-group
            animationDuration="2000ms"
            (selectedTabChange)="onTabChanged($event)"
          >
            <mat-tab label="Schedule" class="label"></mat-tab>
            @if (hasPlayoffs) {
            <mat-tab label="Playoffs"></mat-tab>
            } @if (hasStandings) {
            <mat-tab label="Standings"></mat-tab>
            }
          </mat-tab-group>
        </div>
      </mat-toolbar>
    </mat-grid-tile>
    <mat-grid-tile cols="1">
      <mat-toolbar>
        <csbc-game-filter
          [divisions]="divisions"
          [teams]="teams"
          class=""
        ></csbc-game-filter>
      </mat-toolbar>
    </mat-grid-tile>
  </mat-grid-list>

    <div class="col-sm-4 col-12">
    </div>
    <div class="col-sm-2 col-0"></div>
    <div class="col-sm-6 col-12">
    </div>
  </div> -->
</div>
