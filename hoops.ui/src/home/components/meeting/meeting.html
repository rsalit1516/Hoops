@if (info(); as data) {
<mat-card>
    <mat-card-header>
      <mat-card-title>{{ data.title }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="sub-title">{{ data.subTitle }}</div>
      <div class="text-center" style="padding-left:24px;padding-right:24px;padding-top:12px;">
        <span>{{ data.body }}</span>
      </div>
      <div class="text-center" [hidden]="!data.location">
        Location: {{ data.location }}
      </div>
      <div class="text-center" [hidden]="!data.dateAndTime">
        Date/Time: {{ data.dateAndTime }}

      </div>
    </mat-card-content>
  </mat-card>
}
