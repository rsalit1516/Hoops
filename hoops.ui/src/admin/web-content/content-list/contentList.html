<div class="container">
  <div id="panelContent" class="row">
    <content-list-toolbar />
  </div>
  <div class="row">
    <div class="table-wrapper w-full">
      <ng-template #expirationDateTemplate let-item>
        {{ item.expirationDate | date: "M/d/yy" }}
      </ng-template>

      <ng-template #actionsTemplate let-item>
        <button
          mat-raised-button
          class="edit"
          (click)="$event.stopPropagation(); cloneContent(item)"
          mat-button
        >
          <mat-icon>file_copy</mat-icon>
          Clone
        </button>
      </ng-template>

      <app-generic-mat-table
        [columns]="columns"
        [data]="dataSource.data"
        [pageSize]="pageSize"
        (rowClick)="editContent($event)"
      />
    </div>
    <!-- legacy paginator kept for compatibility, now replaced by generic table paginator -->
    <!--
    <mat-paginator aria-label="Select page of users"
      [pageSizeOptions]="[5, 10, 25, 100]"
      [pageSize]="pageSize"
      [showFirstLastButtons]="showFirstLastButtons"
      (page)="onPage($event)"
    />
    -->
  </div>
</div>
