<table class="w-full border-collapse">
  <thead>
    <tr class="border-b-2">
      <th class="text-left py-2 pr-4 w-12">Include</th>
      <th class="text-left py-2 pr-4">Division</th>
      <th class="text-left py-2 w-28">Teams</th>
    </tr>
  </thead>
  <tbody>
    @for (row of rows(); track row.template.name) {
      <tr class="border-b">
        <td class="py-2 pr-4">
          <mat-checkbox
            [checked]="row.selected()"
            (change)="row.selected.set($event.checked)"
            [attr.aria-label]="'Include ' + row.template.name"
          />
        </td>
        <td class="py-2 pr-4">{{ row.template.name }}</td>
        <td class="py-1">
          <mat-form-field appearance="fill" class="team-count-field">
            <mat-label>Teams</mat-label>
            <input
              matInput
              type="number"
              min="1"
              [value]="row.teamCount()"
              (change)="setTeamCount(row, $any($event.target).value)"
              [disabled]="!row.selected()"
            />
          </mat-form-field>
        </td>
      </tr>
    }
  </tbody>
</table>
