<div class="container mx-auto w-full">
  <div id="panelContent" class="row">
    <csbc-seasons-toolbar />
    <div class="flex justify-between items-center w-full">
      <ng-template #fromDateTemplate let-item>
        {{ item.fromDate | date : "shortDate" }}
      </ng-template>

      <ng-template #toDateTemplate let-item>
        {{ item.toDate | date : "shortDate" }}
      </ng-template>

      <app-generic-mat-table
        [columns]="columns"
        [data]="dataSource.data"
        [pageSize]="pageSize"
        (rowClick)="edit($event)"
      />
    </div>
  </div>
</div>
