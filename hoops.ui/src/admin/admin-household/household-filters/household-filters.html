<div class="household-filters-container">
  <div class="alphabetical-filter">
    <csbc-alphabetical-search [(selectedLetter)]="selectedLetter" />
  </div>

  <form [formGroup]="filterForm">
    <csbc-filter-card [hasActiveFilters]="hasActiveFilters" (clearClicked)="clearFilters()">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
        <mat-label>Search by Name</mat-label>
        <input matInput formControlName="searchText" />
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone" />
      </mat-form-field>
    </csbc-filter-card>
  </form>
</div>
