<mat-card class="admin-detail-scroll">
  <mat-card-title>{{ title }}</mat-card-title>
  <mat-card-content>
    <div class="flex flex-col gap-4 h-full px-3">
      <mat-form-field class="form-control w-full" appearance="fill">
        <mat-label>Team No</mat-label>
        <input matInput placeholder="" [formField]="editTeamForm.teamNo" />
      </mat-form-field>
      <mat-form-field class="form-control w-full" appearance="fill">
        <mat-label>Color</mat-label>
        <mat-select [formField]="editTeamForm.color" class="form-control">
          @for (color of colorService.colors(); track color.colorId) {
          <mat-option [value]="color.colorId">
            {{ color.colorName }}
          </mat-option>
          }
        </mat-select>
      </mat-form-field>
      <mat-form-field class="form-control w-full" appearance="fill">
        <mat-label>Team Name</mat-label>
        <input matInput [formField]="editTeamForm.teamName" />
        <mat-hint align="start"
          ><strong>(Optional) if you don't want (color - team number)</strong>
        </mat-hint>
      </mat-form-field>
    </div>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="Primary" (click)="newTeam()">
      New Team
    </button>
    <button
      mat-raised-button
      color="Primary"
      [disabled]="!isFormValid() || !isFormDirty()"
      (click)="save()"
    >
      Save
    </button>
    <button mat-raised-button color="Primary" (click)="cancel()">Cancel</button>
  </mat-card-actions>
</mat-card>
