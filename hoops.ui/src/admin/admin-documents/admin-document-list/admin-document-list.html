<div class="container mx-auto w-full">
  <mat-toolbar>
    <mat-toolbar-row>
      <button mat-raised-button type="button" (click)="addNew()">New</button>
    </mat-toolbar-row>
  </mat-toolbar>

  <div id="panelContent" class="row">
    <app-generic-mat-table
      [columns]="columns"
      [data]="dataSource.data"
      [pageSize]="pageSize"
      (rowClick)="edit($event)"
    />
  </div>
</div>
