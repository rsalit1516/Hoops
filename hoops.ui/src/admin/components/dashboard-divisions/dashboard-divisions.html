
<mat-card class="dashboard-card">
  <mat-card-header class="">
    <mat-card-title class="">Divisions</mat-card-title>
  </mat-card-header>
  <mat-card-content class="">

    <table mat-table [dataSource]="seasonDivisions() || []" class="w-full">
      <ng-container matColumnDef="division">
        <th mat-header-cell *matHeaderCellDef>Division</th>
        <td mat-cell *matCellDef="let element">{{ element.divisionDescription }}</td>
      </ng-container>
      <ng-container matColumnDef="teams">
        <th mat-header-cell *matHeaderCellDef class="mat-column-players">Teams</th>
        <td mat-cell *matCellDef="let element" class="mat-column-players">{{ getTeamCount(element) }}</td>
      </ng-container>
      <ng-container matColumnDef="players">
        <th mat-header-cell *matHeaderCellDef class="mat-column-players">Players</th>
        <td mat-cell *matCellDef="let element" class="mat-column-players">{{ getPlayerCount(element) }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          [class.selected]="row === selectedDivision"
          (click)="goToDivision(row)"></tr>
    </table>
  </mat-card-content>
</mat-card>
