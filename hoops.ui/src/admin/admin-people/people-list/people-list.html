<ng-template #registerTemplate let-item>
  @if (item.player) {
  <button mat-raised-button color="primary" (click)="onRegister($event, item)">
    Register
  </button>
  }
</ng-template>

<csbc-list-page-shell [title]="'People'" [count]="filteredPeople().length">
  <div filter>
    <csbc-people-filters
      [filters]="filters()"
      (filterChange)="onFilterChange($event)"
    />
  </div>

  <div actions>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon>
      New
    </button>
  </div>

  <app-generic-mat-table
    list
    [columns]="columns"
    [data]="filteredPeople()"
    (rowClick)="onRowClick($event)"
  />
</csbc-list-page-shell>
