<div class="people-filters-container">
  <div class="alphabetical-filter">
    <csbc-alphabetical-search [(selectedLetter)]="selectedLetter" />
  </div>

  <form [formGroup]="filterForm">
    <csbc-filter-card [hasActiveFilters]="hasActiveFilters" (clearClicked)="clearFilters()">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName" />
      </mat-form-field>
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName" />
      </mat-form-field>

      <div class="checkbox-field">
        <mat-checkbox formControlName="playerOnly">
          Players Only
        </mat-checkbox>
      </div>
    </csbc-filter-card>
  </form>
</div>
