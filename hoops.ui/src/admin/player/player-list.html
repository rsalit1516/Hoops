<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-4">Players</h2>

  <!-- Selectors -->
  <div class="flex gap-4 mb-4">
    <div class="flex-1">
      <season-select />
    </div>
    <div class="flex-1">
      <division-select />
    </div>
  </div>

  <div class="flex gap-4 items-start">
    <!-- Player Table -->
    <div class="flex-1 min-w-0">
      @if (isLoading) {
      <div class="flex justify-center items-center p-8">
        <mat-spinner></mat-spinner>
      </div>
      }

      @if (!isLoading) {
      <div class="mat-elevation-z8">
        <app-generic-mat-table
          list
          [columns]="columns"
          [data]="dataSource.data"
          [pageSize]="pageSize"
          pageSizeKey="hoops.pageSize.playerRegistrationList"
          (rowClick)="onRowClick($event)"
        />
      </div>
      }
    </div>

    <!-- Eligible & Unregistered Side Panel -->
    <div class="w-72 flex-shrink-0">
      <csbc-eligible-persons-panel
        [division]="divisionService.selectedDivision()"
        [registeredPersonIds]="registeredPersonIds()"
        (personSelected)="onEligiblePersonClick($event)"
      />
    </div>
  </div>
</div>
