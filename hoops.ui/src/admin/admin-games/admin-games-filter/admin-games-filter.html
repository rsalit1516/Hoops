<mat-toolbar color="primary">
  <button
    mat-raised-button
    type="button"
    (click)="newGame()"
    aria-label="Add a game to the season schedule"
  >
    <mat-icon>add</mat-icon>
    New
  </button>
  <season-select />
  <game-type-select (gameTypeChanged)="handleGameTypeChange($event)"
   />
  <division-select (divisionChanged)="handleDivisionChange($event)"
   />
</mat-toolbar>
