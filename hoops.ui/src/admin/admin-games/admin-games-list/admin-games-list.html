<div class="container mx-auto w-full">
  <div id="panelContent" class="row">
    <div class="flex flex-col w-full">
      <ng-template #gameDateTemplate let-item>
        {{ item.gameDate | date : "M/d" }}
      </ng-template>

      <ng-template #gameTimeTemplate let-item>
        {{ item.gameTime | date : "shortTime" }}
      </ng-template>

      <ng-template #homeTeamTemplate let-item>
        {{ item.homeTeamName | teamDisplay : item.homeTeamColor :
        item.homeTeamSeasonNumber }}
      </ng-template>

      <ng-template #visitingTeamTemplate let-item>
        {{ item.visitingTeamName | teamDisplay : item.visitingTeamColor :
        item.visitingTeamSeasonNumber }}
      </ng-template>

      <ng-template #actionsTemplate let-item>
        <button
          type="submit"
          class="edit"
          (click)="$event.stopPropagation(); editGame(item)"
          mat-icon-button
        >
          <mat-icon>edit</mat-icon>
        </button>
      </ng-template>

      <app-generic-mat-table
        [columns]="columns"
        [data]="dataSource.data"
        [pageSize]="pageSize"
        (rowClick)="selectRow($event)"
      />
      <!--
      <div class="table-wrapper" *ngIf="dataSource.data.length === 0">
        <div class="no-data">No data</div>
      </div> -->
    </div>
  </div>
</div>
