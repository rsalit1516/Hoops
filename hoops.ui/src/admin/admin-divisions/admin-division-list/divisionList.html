<div class="container mx-auto w-full">
  <div class="row">
    <csbc-division-toolbar />
  </div>
  <div class="row">
    <div class="col-12">
      <div class="table-wrapper">
        <ng-template #minDateTemplate let-item>
          {{ item.minDate | date : "MM/dd/yyyy" }}
        </ng-template>

        <ng-template #maxDateTemplate let-item>
          {{ item.maxDate | date : "MM/dd/yyyy" }}
        </ng-template>

        <ng-template #teamsTemplate let-item>
          <button
            mat-button
            (click)="$event.stopPropagation(); viewTeams(item)"
            color="primary"
          >
            Teams
          </button>
        </ng-template>

        <app-generic-mat-table
          [columns]="columns"
          [data]="dataSource.data"
          (rowClick)="getRecord($event)"
        />
      </div>

      <!-- <div class="col-sm-8">
    <div *ngIf="selectedDivision">
        <csbc-division-detail [division]="selectedDivision"></csbc-division-detail>
    </div>
</div> -->
    </div>
  </div>
</div>
