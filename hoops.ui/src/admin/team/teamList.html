<div class="admin-toolbar">
  <mat-toolbar>
    <span>Teams</span>
  </mat-toolbar>
</div>

<div class="flex gap-4 p-4 items-start">
  <!-- Left: selectors + team list -->
  <div class="flex-1 min-w-0">
    <div class="flex gap-4 mb-4">
      <season-select class="flex-1" />
      <division-select class="flex-1" />
      <button mat-raised-button color="primary" (click)="addTeam()">Add Team</button>
    </div>

    <app-generic-mat-table
      [columns]="columns"
      [data]="teams()"
      (rowClick)="onSelect($event)"
    />
  </div>

  <!-- Right: team edit form -->
  <div class="w-80 flex-shrink-0">
    <app-admin-team-detail />
  </div>
</div>
