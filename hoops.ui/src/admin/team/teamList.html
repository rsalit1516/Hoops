<div class="container">
  <div class="flex">
    <div class="row">
      <div class="col-6">
        <season-select />
      </div>
      <div class="col-6">
        <division-select />
      </div>
    </div>
    <div class="col-6">
      <button mat-raised-button color="primary" (click)="addTeam()">
        Add Team
      </button>
    </div>

    <div class="flex">
      <div class="col-sm-8">
        <div id="panelSeason" class="row">
          <div class="panel panel-primary">
            <div class="table-wrapper">
              <app-generic-mat-table
                [columns]="columns"
                [data]="dataSource.data"
              />
            </div>
          </div>
        </div>
      </div>

      <!--<div class="col-sm-8">
        <div *ngIf="selectedDivision">
            <csbc-season-detail [season]="selectedDivision"></csbc-season-detail>
        </div>
    </div>-->
    </div>
  </div>
</div>
