<form [formGroup]="filterForm">
  <csbc-filter-card [hasActiveFilters]="hasActiveFilters" (clearClicked)="clearFilters()">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Sponsor Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <div class="checkbox-field">
      <mat-checkbox formControlName="currentSeasonOnly">
        Current Season Only
      </mat-checkbox>
    </div>
  </csbc-filter-card>
</form>
