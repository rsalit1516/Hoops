<mat-card class="admin-detail-scroll">
  <mat-card-header>
    <mat-card-title>
      {{ mode() === 'create' ? 'New Director' : 'Edit Director' }}
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <csbc-director-form
      [director]="director()"
      (save)="onSave($event)"
      (cancel)="onCancel()"
      (delete)="onDelete($event)"
    />
  </mat-card-content>
</mat-card>
