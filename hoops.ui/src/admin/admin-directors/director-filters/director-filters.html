<form [formGroup]="filterForm">
  <csbc-filter-card [hasActiveFilters]="hasActiveFilters" (clearClicked)="clearFilters()" clearLabel="Clear">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search</mat-label>
      <input matInput formControlName="searchText" placeholder="Search by name..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </csbc-filter-card>
</form>
